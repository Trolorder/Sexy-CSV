<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Make your Kraken.csv file Sexy</title>
  <style>
    body {
      background-color: #000000;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .container {
      position: relative;
      max-width: 92%;
      width: 100%;
    }

    img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
    }

    h1 {
      position: absolute;
      top: 22%;
      left: 50%;
      transform: translateX(-50%);
      color: #00bfff;
      font-size: 2.4rem;
      text-shadow: 0 0 15px #00bfff;
      margin: 0;
      text-align: center;
      z-index: 10;
      white-space: nowrap;
    }

    .btn {
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translateX(-50%);
      background: #00bfff;
      color: #000;
      border: none;
      padding: 16px 50px;
      font-size: 24px;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 30px #00bfff;
      white-space: nowrap;
      z-index: 10;
    }

    .btn:hover {
      background: #00e0ff;
      transform: translateX(-50%) scale(1.05);
    }

    /* Compteur visible au milieu pour les tests (rouge + gros) */
    .visit-counter {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff0000;
      font-size: 36px;
      font-weight: bold;
      font-family: monospace;
      z-index: 30;
      background: rgba(0, 0, 0, 0.85);
      padding: 15px 40px;
      border-radius: 12px;
      pointer-events: none;
      user-select: text;
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="https://coinacademy.fr/wp-content/uploads/2022/04/xrp-1600x1000.jpg.webp" alt="XRP">
    <h1>1: Upload your .csv <br>2: Enjoy :)</h1>
    <a href="Git%20csv/Sexy_CSV.html">
      <button class="btn">Make your Kraken.csv file Sexy</button>
    </a>

    <!-- Compteur qui s'affiche -->
    <div class="visit-counter" id="visit-counter">
      Visites : 0
    </div>
  </div>

  <script>
    // ==================== CONFIGURATION DU COMPTEUR ====================
    const namespace = "kraken-sexy-csv";   // Tu peux changer ce nom si tu veux
    const key = "visits";                  // Ne change pas ça

    const counterElement = document.getElementById('visit-counter');

    async function updateVisitorCount() {
      try {
        // Incrémente le compteur et récupère la nouvelle valeur
        const response = await fetch(`https://api.countapi.xyz/hit/${namespace}/${key}`);
        const data = await response.json();

        if (data.value) {
          counterElement.textContent = `Visites : ${data.value}`;
        }
      } catch (error) {
        console.log("Compteur temporairement indisponible");
        counterElement.textContent = "Visites : ?";
      }
    }

    // Lancer le compteur au chargement
    updateVisitorCount();

    // Optionnel : actualiser toutes les 10 secondes (au cas où plusieurs personnes visitent en même temps)
    setInterval(updateVisitorCount, 10000);
  </script>

</body>
</html>
