<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Make your Kraken.csv file Sexy</title>
  <style>
    body {
      background-color: #000000;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .container {
      position: relative;
      max-width: 92%;
      width: 100%;
    }

    img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
    }

    h1 {
      position: absolute;
      top: 22%;
      left: 50%;
      transform: translateX(-50%);
      color: #00bfff;
      font-size: 2.4rem;
      text-shadow: 0 0 15px #00bfff;
      margin: 0;
      text-align: center;
      z-index: 10;
      white-space: nowrap;
    }

    .btn {
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translateX(-50%);
      background: #00bfff;
      color: #000;
      border: none;
      padding: 16px 50px;
      font-size: 24px;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 30px #00bfff;
      white-space: nowrap;
      z-index: 10;
    }

    .btn:hover {
      background: #00e0ff;
      transform: translateX(-50%) scale(1.05);
    }

    /* Compteur mondial discret - presque invisible */
    .visit-counter {
      position: absolute;
      bottom: 15px;
      left: 20px;
      color: #1a1a1a;           /* très foncé = invisible sur fond noir */
      font-size: 12px;
      font-family: monospace;
      z-index: 5;
      pointer-events: none;
      user-select: text;        /* visible quand on fait Ctrl + A */
    }
  </style>
  <script src="https://cdn.counter.dev/script.js" data-id="9d93fce1-b2c0-467f-ab06-fb3e9277bad1" data-utcoffset="1"></script>
</head>
<body>

  <div class="container">
    <img src="https://coinacademy.fr/wp-content/uploads/2022/04/xrp-1600x1000.jpg.webp" alt="XRP">
    <h1>1: Upload your .csv <br>2: Enjoy :)</h1>
    <a href="Git%20csv/Sexy_CSV.html">
      <button class="btn">Make your Kraken.csv file Sexy</button>
    </a>

    <!-- Compteur discret -->
    <div class="visit-counter" id="visit-counter">
      Visites : ...
    </div>
  </div>

  <script>
    // Compteur local temporaire (pour avoir quelque chose d'affiché)
    // Tu peux le supprimer plus tard si tu ne veux rien afficher
    let count = parseInt(localStorage.getItem('krakenVisits')) || 42;
    count += 1;
    localStorage.setItem('krakenVisits', count);
    document.getElementById('visit-counter').textContent = `Visites : ${count}`;
  </script>

</body>
</html>
