    body {

      overflow: hidden;
      font-family: Arial, sans-serif;

    .container {
      position: relative;

      z-index: 10;
    }
    .btn:hover {
      background: #00e0ff;
      transform: translateX(-50%) scale(1.05);

    .visit-counter {
      position: absolute;
      bottom: 12px;
      left: 15px;
      color: #0a0a0a;        /* presque invisible sur fond noir */
