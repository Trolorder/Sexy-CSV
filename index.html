<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Make your file.csv Sexy</title>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="e7210334-7205-44e7-baca-1e2bd8e5ec40"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #000;        /* ← couleur de fond */
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* =============================================
       TITRE
       ============================================= */
    h1 {
      color: #00bfff;
      font-size: clamp(1.4rem, 4vw, 2.4rem);
      text-shadow: 0 0 15px #00bfff;
      text-align: center;
      line-height: 1.4;
      padding: 0 20px;

      margin-top: 0px;               /* ← PC : espace AU-DESSUS du titre */
      margin-bottom: 28px;           /* ← PC : espace SOUS le titre (entre titre et bouton CSV) */
    }

    /* =============================================
       BOUTON CSV
       ============================================= */
    .btn-csv-wrap {
      margin-bottom: 28px;           /* ← PC : espace entre bouton CSV et image */
    }

    /* =============================================
       STYLE COMMUN BOUTONS
       ============================================= */
    .btn {
      background: #00bfff;
      color: #000;
      border: none;
      padding: 16px 45px;
      font-size: clamp(1.1rem, 3vw, 1.55rem);
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 30px #00bfff;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }
    .btn:hover { background: #00e0ff; transform: scale(1.07); }

    /* =============================================
       BLOC IMAGE XRP + BOUTON RICHLIST
       ============================================= */
    .xrp-block {
      position: relative;
      width: 100%;
      max-width: 700px;              /* ← PC : largeur max du bloc */

      margin-top: 0px;               /* ← PC : monte/descend l'image (négatif = monte) */
    }

    /* =============================================
       IMAGE XRP
       ============================================= */
    .xrp-block img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
      object-position: center 60%;   /* ← PC : cadrage vertical de l'image */
      max-height: 60vh;              /* ← PC : hauteur de l'image */
      mask-image: linear-gradient(
        to bottom,
        transparent 0%,
        black 15%,
        black 72%,
        transparent 100%
      );
      -webkit-mask-image: linear-gradient(
        to bottom,
        transparent 0%,
        black 15%,
        black 72%,
        transparent 100%
      );
    }

    /* =============================================
       BOUTON RICHLIST (dans l'image)
       ============================================= */
    .btn-richlist-wrap {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 0 20px;
      z-index: 2;

      bottom: 14%;                   /* ← PC : position verticale dans l'image */
    }

    .btn-richlist-wrap p {
      color: #00bfff;
      font-size: clamp(0.85rem, 2.5vw, 1.1rem);
      text-shadow: 0 0 10px #00bfff;
      text-align: center;
      font-weight: bold;
    }

    /* ╔══════════════════════════════════════════╗
       ║           MOBILE  (≤ 520px)              ║
       ║  Chaque valeur est indépendante du PC    ║
       ╚══════════════════════════════════════════╝ */
    @media (max-width: 520px) {

      /* Titre — position sur mobile */
      h1 {
        margin-top: -75px;           /* ← MOBILE : monte le titre (plus négatif = plus haut) */
        margin-bottom: 18px;         /* ← MOBILE : espace sous le titre */
      }

      /* Bouton CSV — espace sous lui */
      .btn-csv-wrap {
        margin-bottom: 200px;         /* ← MOBILE : espace entre bouton CSV et image */
      }

      /* Boutons — taille sur mobile */
      .btn {
        padding: 14px 32px;          /* ← MOBILE : taille des boutons */
        font-size: 1.1rem;           /* ← MOBILE : taille texte boutons */
      }

      /* Image XRP */
      .xrp-block {
        margin-top: -300px;           /* ← MOBILE : monte l'image (plus négatif = plus haut) */
      }
      .xrp-block img {
        max-height: 75vh;            /* ← MOBILE : hauteur de l'image */
        object-position: center 55%; /* ← MOBILE : cadrage vertical */
      }

      /* Bouton Richlist */
      .btn-richlist-wrap {
        bottom: 30%;                 /* ← MOBILE : position du bouton dans l'image */
      }
    }
  </style>
</head>
<body>

  <h1>1: Upload your .csv<br>2: Enjoy :)</h1>

  <div class="btn-csv-wrap">
    <a href="Git%20csv/Sexy_CSV.html">
      <button class="btn">Make MyFile.csv Sexy</button>
    </a>
  </div>

  <div class="xrp-block">
    <img
      src="https://raw.githubusercontent.com/Trolorder/Sexy-CSV/refs/heads/main/68260caacb45056c0e10972fba9445f6B.png"
      alt="XRP logo"
    >
    <div class="btn-richlist-wrap">
      <p>Where do you stand on the XRP Richlist?</p>
      <a href="https://rich-list.info" target="_blank" rel="noopener">
        <button class="btn">🏆 Check My Ranking</button>
      </a>
    </div>
  </div>

</body>
</html>
