<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Make your Kraken.csv file Sexy</title>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="e7210334-7205-44e7-baca-1e2bd8e5ec40"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      gap: 0;
    }

    h1 {
      color: #00bfff;
      font-size: clamp(1.4rem, 4vw, 2.4rem);
      text-shadow: 0 0 15px #00bfff;
      text-align: center;
      line-height: 1.4;
      margin-bottom: 30px;
    }

    .btn {
      background: #00bfff;
      color: #000;
      border: none;
      padding: 16px 45px;
      font-size: clamp(1.1rem, 3vw, 1.55rem);
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 30px #00bfff;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 0;
    }

    .btn:hover {
      background: #00e0ff;
      transform: scale(1.07);
    }

    .xrp-wrapper {
      width: 100%;
      max-width: 700px;
      margin-top: -10px; /* colle l'image sous le bouton */
    }

    .xrp-wrapper img {
      width: 100%;
      height: auto;
      display: block;
      /* on crop le haut de l'image (le coin XRP) et on garde le X */
      object-fit: cover;
      object-position: center 60%;
      max-height: 55vh;
      border-radius: 0 0 16px 16px;
      mask-image: linear-gradient(to bottom, transparent 0%, black 18%, black 80%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 18%, black 80%, transparent 100%);
    }

    @media (max-width: 480px) {
      .xrp-wrapper {
        max-width: 100%;
        margin-top: -5px;
      }

      .xrp-wrapper img {
        max-height: 45vh;
        object-position: center 55%;
      }
    }
  </style>
</head>
<body>

  <h1>1: Upload your .csv<br>2: Enjoy :)</h1>

  <a href="Git%20csv/Sexy_CSV.html">
    <button class="btn">Make your Kraken.csv file Sexy</button>
  </a>

  <div class="xrp-wrapper">
    <img
      src="https://coinacademy.fr/wp-content/uploads/2022/04/xrp-1600x1000.jpg.webp"
      alt="XRP logo"
    >
  </div>

</body>
</html>
