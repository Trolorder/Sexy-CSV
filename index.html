<!DOCTYPE html>

  <style>
    body {

      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .container {
      position: relative;
      max-width: 92%;

    }
    img {
      width: 100%;

      border-radius: 50px;

      box-shadow: 0 0 30px #00bfff;
      white-space: nowrap;
      z-index: 10;
    }
    .btn:hover {
      background: #00e0ff;
      transform: translateX(-50%) scale(1.05);
    }

    /* Compteur discret - presque invisible, mais visible avec Ctrl + A */
    .visit-counter {
      position: absolute;
      bottom: 15px;
      left: 20px;
      color: #111111;           /* très foncé sur fond noir */
      font-size: 13px;
      font-family: monospace;
      z-index: 5;
