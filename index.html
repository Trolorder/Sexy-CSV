<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title></title>
  <style>
    body {
      background-color: #000000;
      color: #ffffff;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .container {
      position: relative;
      max-width: 90%;
      max-height: 90vh;
      text-align: center;
    }

    img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
    }

    h1 {
      color: #00bfff;
      margin: 15px 0 10px 0;
      font-size: 2.2rem;
      position: absolute;
      top: 5%;
      left: 50%;
      transform: translateX(-50%);
      text-shadow: 0 0 10px #00bfff;
    }

    .btn {
      position: absolute;
      left: 50%;
      top: 20%;               /* ← plus bas que le centre : change en 60% si trop bas, 70% si trop haut */
      transform: translate(-50%, -50%);
      background: #00bfff;
      color: #000;
      border: none;
      padding: 16px 40px;
      font-size: 24px;
      font-weight: bold;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 0 20px #00bfff;
      white-space: nowrap;
      transition: all 0.3s;
      z-index: 10;            /* pour qu'il soit au-dessus de l'image */
    }

    .btn:hover {
      background: #00e0ff;
      transform: translate(-50%, -50%) scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
        <div class="container">
        <h1 style="position:relative;">
            1: Upload your .csv <br>
            2: Enjoy :)
            <button onclick="toggleDiscreetMode()" id="discreetBtn"

            </button>
        </h1>
    <img src="https://coinacademy.fr/wp-content/uploads/2022/04/xrp-1600x1000.jpg.webp" alt="Logo XRP">

    <h1></h1>

    <a href="Git%20csv/Sexy_CSV.html">
      <button class="btn">Make your Kraken.csv file Sexy</button>
    </a>
  </div>
</body>
</html>
