<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Make your file.csv Sexy</title>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="e7210334-7205-44e7-baca-1e2bd8e5ec40"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      font-family: Arial, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    /* =============================================
       TITRE
       padding-top  : espace haut de page → titre
       margin-bottom: espace titre → bouton CSV
       ============================================= */
    h1 {
      color: #00bfff;
      font-size: clamp(1.3rem, 4vw, 2.2rem);
      text-shadow: 0 0 15px #00bfff;
      text-align: center;
      line-height: 1.4;
      padding: 0 20px;
      padding-top:    5vh;   /* ← PC : espace au-dessus du titre */
      margin-bottom:  3vh;   /* ← PC : espace sous le titre      */
    }

    /* =============================================
       STYLE COMMUN BOUTONS
       ============================================= */
    .btn {
      background: #00bfff;
      color: #000;
      border: none;
      padding: 14px 40px;
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 28px #00bfff;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      white-space: nowrap;
    }
    .btn:hover { background: #00e0ff; transform: scale(1.07); }

    /* =============================================
       BOUTON CSV
       margin-bottom: espace bouton CSV → image
       ============================================= */
    .btn-csv-wrap {
      flex-shrink: 0;
      margin-bottom: 1vh;    /* ← PC : espace entre bouton CSV et image */
    }

    /* =============================================
       BLOC IMAGE
       Le bloc prend tout l'espace restant (flex:1).
       max-height : taille max du logo
         → diminue pour un logo plus petit
         → augmente pour un logo plus grand
       ============================================= */
    .xrp-block {
      position: relative;
      width: 100%;
      max-width: 700px;
      flex: 1;
      min-height: 0;
      max-height: 62vh;      /* ← PC : taille max du logo */
    }

    /* =============================================
       IMAGE XRP
       object-position : cadrage vertical
       Les valeurs du mask contrôlent le fondu
       ============================================= */
    .xrp-block img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center 58%;   /* ← PC : cadrage vertical */
      mask-image: linear-gradient(
        to bottom,
        transparent 0%,
        black 12%,
        black 68%,
        transparent 100%
      );
      -webkit-mask-image: linear-gradient(
        to bottom,
        transparent 0%,
        black 12%,
        black 68%,
        transparent 100%
      );
    }

    /* =============================================
       BOUTON RICHLIST (ancré dans l'image)
       bottom : % depuis le bas du bloc image
         → augmente pour monter
         → diminue pour descendre
       ============================================= */
    .btn-richlist-wrap {
      position: absolute;
      bottom: 18%;           /* ← PC : position du bouton dans l'image */
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 0 20px;
      z-index: 2;
    }

    .btn-richlist-wrap p {
      color: #00bfff;
      font-size: clamp(0.8rem, 2.5vw, 1rem);
      text-shadow: 0 0 10px #00bfff;
      text-align: center;
      font-weight: bold;
    }

    /* =============================================
       MOBILE ≤ 520px
       ============================================= */
    @media (max-width: 520px) {

      h1 {
        padding-top:   2vh;   /* ← MOBILE : espace au-dessus du titre */
        margin-bottom: 2vh;   /* ← MOBILE : espace sous le titre      */
      }

      .btn-csv-wrap {
        margin-bottom: 1vh;   /* ← MOBILE : espace entre bouton CSV et image */
      }

      .btn {
        padding: 13px 32px;   /* ← MOBILE : taille des boutons */
      }

      .xrp-block {
        max-height: 70vh;     /* ← MOBILE : taille max du logo */
      }

      .xrp-block img {
        object-position: center 52%;  /* ← MOBILE : cadrage vertical */
      }

      .btn-richlist-wrap {
        bottom: 20%;          /* ← MOBILE : position du bouton dans l'image */
      }
    }
  </style>
</head>
<body>

  <h1>1: Upload your .csv<br>2: Enjoy :)</h1>

  <div class="btn-csv-wrap">
    <a href="Git%20csv/Sexy_CSV.html">
      <button class="btn">Make MyFile.csv Sexy</button>
    </a>
  </div>

  <div class="xrp-block">
    <img
      src="https://raw.githubusercontent.com/Trolorder/Sexy-CSV/refs/heads/main/68260caacb45056c0e10972fba9445f6M.png"
      alt="XRP logo"
    >
    <div class="btn-richlist-wrap">
      <p>what's my rank ?</p>
      <a href="https://rich-list.info" target="_blank" rel="noopener">
        <button class="btn">Check My Ranking</button>
      </a>
    </div>
  </div>

</body>
</html>
