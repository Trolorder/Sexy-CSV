<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Make your file.csv Sexy</title>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="e7210334-7205-44e7-baca-1e2bd8e5ec40"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ─────────────────────────────────────────────
       CORPS : exactement la hauteur de l'écran.
       Tout s'organise dedans, rien ne déborde.
    ───────────────────────────────────────────── */
    body {
      background: #000;
      font-family: Arial, sans-serif;
      height: 100dvh;          /* 100% écran, barre mobile incluse */
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;        /* pas de scroll */
    }

    /* ─────────────────────────────────────────────
       TITRE
       padding-top : espace entre le haut de l'écran et le titre
    ───────────────────────────────────────────── */
    h1 {
      color: #00bfff;
      font-size: clamp(1.3rem, 4vw, 2.2rem);
      text-shadow: 0 0 15px #00bfff;
      text-align: center;
      line-height: 1.4;
      padding: 0 20px;

      padding-top: 5vh;        /* ← espace AU-DESSUS du titre (% écran) */
      margin-bottom: 3vh;      /* ← espace SOUS le titre (% écran)      */
    }

    /* ─────────────────────────────────────────────
       STYLE COMMUN BOUTONS
    ───────────────────────────────────────────── */
    .btn {
      background: #00bfff;
      color: #000;
      border: none;
      padding: 14px 40px;
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 28px #00bfff;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      white-space: nowrap;
    }
    .btn:hover { background: #00e0ff; transform: scale(1.07); }

    /* ─────────────────────────────────────────────
       BOUTON CSV
       margin-bottom : espace entre lui et l'image
    ───────────────────────────────────────────── */
    .btn-csv-wrap {
      margin-bottom: 3vh;      /* ← espace entre bouton CSV et image (% écran) */
      flex-shrink: 0;
    }

    /* ─────────────────────────────────────────────
       BLOC IMAGE — remplit TOUT l'espace restant.
       C'est la clé : plus besoin de calculer quoi
       que ce soit, l'image s'adapte toute seule.
    ───────────────────────────────────────────── */
    .xrp-block {
      position: relative;
      width: 100%;
      max-width: 700px;        /* ← largeur max (surtout utile sur PC) */
      flex: 1;                 /* ← prend tout l'espace restant */
      min-height: 0;           /* ← nécessaire pour que flex:1 fonctionne */
    }

    .xrp-block img {
      width: 100%;
      height: 100%;            /* ← remplit exactement le bloc */
      display: block;
      object-fit: cover;
      object-position: center 58%;  /* ← cadrage vertical de l'image */
      mask-image: linear-gradient(
        to bottom,
        transparent 0%,
        black 12%,
        black 68%,             /* ← jusqu'où l'image est pleinement visible */
        transparent 100%
      );
      -webkit-mask-image: linear-gradient(
        to bottom,
        transparent 0%,
        black 12%,
        black 68%,
        transparent 100%
      );
    }

    /* ─────────────────────────────────────────────
       BOUTON RICHLIST
       Ancré dans l'image via position:absolute.
       bottom : % depuis le bas de l'image.
       Comme l'image remplit toujours exactement
       le bloc, ce % est fiable sur tous les écrans.
    ───────────────────────────────────────────── */
    .btn-richlist-wrap {
      position: absolute;
      bottom: 18%;             /* ← position dans l'image (augmente = monte) */
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 0 20px;
      z-index: 2;
    }

    .btn-richlist-wrap p {
      color: #00bfff;
      font-size: clamp(0.8rem, 2.5vw, 1rem);
      text-shadow: 0 0 10px #00bfff;
      text-align: center;
      font-weight: bold;
    }

    /* ─────────────────────────────────────────────
       MOBILE  ≤ 520px
       Seulement les petits ajustements fins,
       la structure de base reste la même.
    ───────────────────────────────────────────── */
    @media (max-width: 520px) {

      h1 {
        padding-top: 2vh;      /* ← MOBILE : espace au-dessus du titre  */
        margin-bottom: 0vh;  /* ← MOBILE : espace sous le titre       */
      }

      .btn-csv-wrap {
        margin-bottom: 0vh;    /* ← MOBILE : espace entre bouton et image */
      }

      .btn {
        padding: 13px 32px;    /* ← MOBILE : taille des boutons          */
      }

      .xrp-block img {
        object-position: center 47%;  /* ← MOBILE : cadrage vertical      */
      }

      .btn-richlist-wrap {
        bottom: 20%;           /* ← MOBILE : position bouton dans l'image */
      }
    }
  </style>
</head>
<body>

  <!-- TITRE -->
  <h1>1: Upload your .csv<br>2: Enjoy :)</h1>

  <!-- BOUTON CSV -->
  <div class="btn-csv-wrap">
    <a href="Git%20csv/Sexy_CSV.html">
      <button class="btn">Make MyFile.csv Sexy</button>
    </a>
  </div>

  <!-- IMAGE + BOUTON RICHLIST -->
  <div class="xrp-block">
    <img
      src="https://raw.githubusercontent.com/Trolorder/Sexy-CSV/refs/heads/main/68260caacb45056c0e10972fba9445f6M.png"
      alt="XRP logo"
    >
    <div class="btn-richlist-wrap">
      <p>Where do you stand on the XRP Richlist?</p>
      <a href="https://rich-list.info" target="_blank" rel="noopener">
        <button class="btn">🏆 Check My Ranking</button>
      </a>
    </div>
  </div>

</body>
</html>
