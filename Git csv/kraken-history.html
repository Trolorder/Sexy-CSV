<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kraken - Historique Complet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.2.0/dist/chartjs-plugin-zoom.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        :root {
            --bg: #0a0f1c;
            --card: #121a2e;
            --border: #1e2a47;
            --accent: #60a5fa;
            --text: #e2e8f0;
            --text-light: #94a3b8;
            --success: #4ade80;
            --danger: #f87171;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 24px;
        }
        .container { max-width: 1580px; margin: 0 auto; }

        h1 {
            text-align: center;
            color: #93c5fd;
            font-size: 2.45rem;
            margin-bottom: 32px;
            font-weight: 600;
        }

        .card {
            background: var(--card);
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
            overflow: hidden;
            margin-bottom: 32px;
        }

        .card-header {
            padding: 20px 28px;
            background: #1a2338;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .card-header h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .toggle-icon {
            font-size: 1.4rem;
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        /* Contenu collapsible générique */
        .collapsible-content {
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.4s ease, opacity 0.3s ease;
            max-height: 2000px;
            opacity: 1;
        }
        .collapsible-content.collapsed {
            max-height: 0 !important;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
            opacity: 0;
        }

        .manual-inner {
            padding: 24px;
        }

        .portfolio-inner {
            padding: 24px;
        }

        .summary { display: flex; flex-wrap: wrap; gap: 16px; }
        .summary > div {
            flex: 1;
            min-width: 220px;
            background: rgba(30, 42, 71, 0.6);
            padding: 22px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .controls { padding: 28px 24px; }
        .filters-grid { display: grid; grid-template-columns: 2.2fr 1.1fr 1.1fr 1.2fr 1.2fr; gap: 20px; }

        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        .filter-group label { font-size: 0.9rem; color: var(--text-light); font-weight: 500; }

        /* Masquer les flèches des inputs number */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        select, input {
            height: 48px;
            padding: 0 16px;
            background: #1a2338;
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        button {
            background: var(--accent);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { background: #93c5fd; transform: translateY(-2px); }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 28px;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155; transition: .3s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 22px; width: 22px; left: 3px; bottom: 3px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #60a5fa; }
        input:checked + .slider:before { transform: translateX(24px); }

        .chart-container {
            position: relative;
            height: 560px;
            padding: 24px;
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: #1a2338; color: #93c5fd; padding: 16px 12px; text-align: left; cursor: pointer; }
        td { padding: 14px 12px; border-bottom: 1px solid var(--border); }

        .positive { color: #4ade80; font-weight: 600; }
        .negative { color: #f87171; font-weight: 600; }

        /* Mode discret : masque toutes les valeurs €  */
        body.discreet .discreet-hide {
            filter: blur(8px);
            user-select: none;
            transition: filter 0.3s ease;
        }
        body.discreet .discreet-hide:hover {
            filter: blur(0px);
            transition: filter 3s ease;
        }
        /* Graphiques et tooltips en mode discret — gérés en JS */
        body.discreet #curveChart,
        body.discreet #balanceChart {
            filter: blur(8px);
            transition: filter 3s ease; /* s'estompe dès que le curseur entre */
        }
        body.discreet #chartjs-custom-tooltip,
        body.discreet #curve-tooltip {
            filter: blur(8px);
            transition: filter 3s ease;
        }
        /* Bouton agrandir caché en mode discret */
        body.discreet .btn-expand { display: none !important; }
        /* Tooltip fluide */
        #chartjs-custom-tooltip, #curve-tooltip {
            transition: opacity 0.15s ease, left 0.05s linear, top 0.05s linear, filter 3s ease;
        }

        .table-header {
            padding: 16px 24px;
            background: #1a2338;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
        }
        .left-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .right-controls {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        /* ===================== RESPONSIVE MOBILE ===================== */
        @media (max-width: 768px) {
            body { padding: 12px; }
            h1 { font-size: 1.3rem; margin-bottom: 16px; padding-right: 0; }
            h1 .discreet-desktop { display: none; }
            .container { max-width: 100%; }
            .filters-grid { grid-template-columns: 1fr 1fr !important; gap: 10px; }
            .filters-grid > :first-child { grid-column: 1 / -1; }
            #sideCardsWrapper { flex-direction: column !important; }
            .summary { gap: 8px; }
            .summary > div { min-width: 140px; padding: 14px; font-size: 0.9rem; }
            .portfolio-card-header { padding: 14px 16px; gap: 10px; }
            .portfolio-card-header .header-controls { gap: 8px; }
            .card-header { padding: 14px 16px; }
            .chart-container { height: 320px; padding: 12px; }
            table { font-size: 0.8rem; }
            th, td { padding: 8px 6px; }
            .table-header { flex-direction: column; gap: 10px; }
            .right-controls { align-items: flex-start; }
            select, input { height: 40px; }
            button { padding: 10px 16px; font-size: 0.85rem; }
            .manual-inner { padding: 14px; }
            .portfolio-inner { padding: 14px; }
        }

        /* ===================== MODALE GRAPHIQUE ===================== */
        .chart-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 99998;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .chart-modal-overlay.open {
            display: flex;
        }
        .chart-modal-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            width: 95vw;
            max-width: 1200px;
            max-height: 90vh;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }
        .chart-modal-close {
            position: absolute;
            top: 14px; right: 14px;
            background: #334155;
            border: none;
            color: #e2e8f0;
            border-radius: 10px;
            padding: 6px 14px;
            font-size: 1.1rem;
            cursor: pointer;
            z-index: 1;
        }
        .chart-modal-close:hover { background: #f87171; color: white; }
        .expand-btn {
            background: #1e2a47;
            color: #94a3b8;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-left: 8px;
        }
        .expand-btn:hover { background: #60a5fa; color: white; border-color: #60a5fa; transform: none; }
        .portfolio-card-header {
            padding: 20px 28px;
            background: #1a2338;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .portfolio-card-header .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            flex: 1;
        }
        .portfolio-card-header .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="position:relative;">
            1: Upload your .csv
            2: Enjoy :)
            <button onclick="toggleDiscreetMode()" id="discreetBtn"
                style="position:absolute; right:0; top:50%; transform:translateY(-50%); background:#60a5fa; padding:8px 18px; font-size:0.85rem; border-radius:12px; color:white; font-weight:500;">
                👁‍🗨 Mode normal
            </button>
        </h1>

        <!-- Modale graphique plein écran -->
        <div class="chart-modal-overlay" id="chartModal" onclick="closeChartModal(event)">
            <div class="chart-modal-box" onclick="event.stopPropagation()">
                <button class="chart-modal-close" onclick="closeChartModal()">✕</button>
                <button id="modalResetZoomBtn" onclick="if(modalChartInstance) { modalChartInstance.resetZoom(); modalZoomLevel=1; modalChartInstance.update(); }" style="position:absolute; top:14px; right:60px; background:#eab308; color:#1e2937; border:none; border-radius:10px; padding:6px 12px; font-size:1rem; cursor:pointer; z-index:1;">🔄</button>
                <div id="chartModalTitle" style="font-size:1.1rem;font-weight:600;color:#93c5fd;margin-bottom:16px;padding-right:100px;"></div>
                <div style="position:relative; height:70vh;">
                    <canvas id="modalCanvas"></canvas>
                </div>
            </div>
        </div>

        <div id="loading" style="text-align:center; padding:80px; color:#60a5fa; font-size:1.3em;">
            Chargement du fichier kraken.csv...
            <div style="margin-top:24px;">
                <label style="display:inline-block; background:#1a2338; border:1px solid var(--border); border-radius:12px; padding:12px 20px; cursor:pointer; color:#60a5fa; font-size:0.95rem;">
                    📂 Ou choisir un fichier CSV
                    <input type="file" id="csvFileInput" accept=".csv" style="display:none;" onchange="loadFromFile(event)">
                </label>
            </div>
        </div>

        <div class="summary card" id="summary" style="display:none;"></div>

        <!-- Portfolio Actuel -->
        <div class="card" id="portfolioCard" style="display:none;">
            <div class="portfolio-card-header">
                <div class="header-left" onclick="togglePortfolioSection()">
                    <h2 style="margin:0; font-size:1.5rem;">📈 Portfolio Actuel & PnL</h2>
                    <i class="fas fa-chevron-down toggle-icon" id="portfolioToggleIcon"></i>
                </div>
                <div class="header-controls">
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; font-size:0.95rem;">
                        <span>Masquer quantités &lt;</span>
                        <input type="number" id="hideSmallPortfolioThreshold" value="100"
                               style="width:75px; text-align:center; background:#1a2338; border:1px solid var(--border); border-radius:8px; color:white;"
                               onchange="refreshPortfolio()">
                        <label class="toggle-switch">
                            <input type="checkbox" id="hideSmallCheck" checked onchange="refreshPortfolio()">
                            <span class="slider"></span>
                        </label>
                    </label>
                    <button onclick="refreshPortfolio()" style="background:#10b981;"><i class="fas fa-sync-alt"></i> Rafraîchir</button>
                </div>
            </div>
            <div class="collapsible-content" id="portfolioCollapsible">
                <div class="portfolio-inner" id="portfolioContent"></div>
            </div>
        </div>

        <!-- Layout 50/50 : Holdings manuels + Graphiques portfolio -->
        <div id="sideCardsWrapper" style="display:none; gap:24px; align-items:stretch; margin-bottom:32px;">

            <!-- Holdings manuels (gauche) -->
            <div class="card" id="manualCard" style="flex:1; min-width:0; margin-bottom:0; display:flex; flex-direction:column;">
                <div class="card-header" onclick="toggleManualSection()">
                    <div style="display:flex; align-items:center; gap:16px;">
                        <h2 style="margin:0; font-size:1.5rem;">✏️ Holdings manuels</h2>
                        <i class="fas fa-chevron-down toggle-icon" id="manualToggleIcon"></i>
                    </div>
                </div>
                <div class="collapsible-content" id="manualCollapsible" style="display:flex; flex-direction:column; flex:1;">
                    <div class="manual-inner" style="display:flex; flex-direction:column; flex:1;">
                        <div style="display:flex; gap:12px; align-items:end; margin-bottom:20px; flex-wrap:wrap;">
                            <div style="flex:1; min-width:130px;"><label>Asset</label><input type="text" id="manualAssetInput" placeholder="ex: XRP" style="width:100%;"></div>
                            <div style="flex:1; min-width:130px;"><label>Quantité</label><input type="number" id="manualQtyInput" step="any" placeholder="123.456789" style="width:100%;"></div>
                            <button onclick="addManualHolding()">+ Ajouter</button>
                        </div>
                        <!-- Table scrollable, hauteur max fixe -->
                        <div style="overflow-y:auto; max-height:260px; border-radius:8px; border:1px solid var(--border);">
                            <table id="manualTable" style="width:100%; border-collapse:collapse;"></table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Graphiques évolution portfolio (droite) -->
            <div class="card" id="portfolioChartsCard" style="flex:1; min-width:0; margin-bottom:0;">
                <div class="card-header" onclick="togglePortfolioChartSection()">
                    <div style="display:flex; align-items:center; gap:16px;">
                        <h2 style="margin:0; font-size:1.5rem;">📊 Graphiques évolution Portfolio</h2>
                        <i class="fas fa-chevron-down toggle-icon" id="portfolioChartToggleIcon"></i>
                    </div>
                    <div style="display:flex;gap:8px;align-items:center;" onclick="event.stopPropagation()">
                        <button onclick="openChartModal('curve')" class="btn-expand" style="background:#1e2a47; color:#94a3b8; border:1px solid var(--border); padding:8px 14px; font-size:0.85rem; border-radius:12px; font-weight:600;">⛶ Agrandir</button>
                        <button onclick="resetCurveZoom()" style="background:#eab308; color:#1e2937; padding:8px 18px; font-size:0.85rem; border-radius:12px; font-weight:600;">Réinitialiser le Zoom</button>
                    </div>
                </div>
                <div class="collapsible-content" id="portfolioChartCollapsible">
                    <div style="padding:24px;">
                        <canvas id="curveChart" style="max-height:360px;"></canvas>
                    </div>
                </div>
            </div>

        </div>

        <div class="controls card" id="controls" style="display:none;">
            <div class="filters-grid">
                <div class="filter-group"><label>Rechercher</label><input type="text" id="search" placeholder="Asset ou type..." onkeyup="applyFilters()"></div>
                <div class="filter-group"><label>Date du</label><input type="date" id="dateFrom" onchange="applyFilters()"></div>
                <div class="filter-group"><label>Date au</label><input type="date" id="dateTo" onchange="applyFilters()"></div>
                <div class="filter-group">
                    <label>Type</label>
                    <select id="typeFilter" onchange="addTypeFilter()">
                        <option value="">Ajouter un type...</option>
                        <option value="deposit">Dépôt</option>
                        <option value="withdrawal">Retrait</option>
                        <option value="trade">Trade</option>
                        <option value="staking">Staking</option>
                        <option value="earn">Earn</option>
                    </select>
                    <div id="selectedTypes" style="margin-top:6px;"></div>
                </div>
                <div class="filter-group">
                    <label>Asset</label>
                    <select id="assetFilterSelect" onchange="addAssetFilter()">
                        <option value="">Ajouter un asset...</option>
                    </select>
                    <div id="selectedAssets" style="margin-top:6px;"></div>
                </div>
            </div>
            <div style="margin-top:24px; display:flex; gap:12px; flex-wrap:wrap;">
                <button onclick="exportFilteredCSV()">📥 Exporter CSV filtré</button>
                <button onclick="resetAllFilters()">🔄 Réinitialiser tout</button>
            </div>
        </div>

        <div class="card" id="chartContainer" style="display:none;">
            <div style="padding:16px 24px; background:#1a2338; display:flex; justify-content:flex-end; gap:8px; border-bottom:1px solid var(--border);">
                <button onclick="openChartModal('bar')" class="btn-expand" style="background:#1e2a47; color:#94a3b8; border:1px solid var(--border); padding:8px 14px; font-size:0.85rem; border-radius:12px; font-weight:600;">⛶ Agrandir</button>
                <button onclick="resetZoom()" style="background:#eab308; color:#1e2937; padding:8px 18px; font-size:0.85rem; border-radius:12px; font-weight:600;">Réinitialiser le Zoom</button>
            </div>
            <div class="chart-container" style="margin:0;">
                <canvas id="balanceChart"></canvas>
            </div>
        </div>

        <div class="card" id="tableContainer" style="display:none;">
            <div class="table-header">
                <div class="left-controls">
                    <div>
                        <label>Afficher :</label>
                        <select id="rowsPerPage" onchange="changeRowsPerPage()" style="width: auto; padding: 0 12px;">
                            <option value="10" selected>10</option>
                            <option value="25">25</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                            <option value="250">250</option>
                            <option value="500">500</option>
                            <option value="1000">1000</option>
                            <option value="999999">Tout</option>
                        </select>
                        <span style="margin-left: 8px;">transactions par page</span>
                    </div>
                    <div class="page-info" id="pageInfo" style="font-weight:500;"></div>
                </div>

                <div class="right-controls">
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; font-size:0.95rem;">
                        <span>Masquer quantités &lt;</span>
                        <input type="number" id="hideQtyThreshold" value="100"
                               style="width:75px; text-align:center; background:#1a2338; border:1px solid var(--border); border-radius:8px; color:white;"
                               onchange="applyFilters()">
                        <label class="toggle-switch">
                            <input type="checkbox" id="hideSmallTableCheck" checked onchange="applyFilters()">
                            <span class="slider"></span>
                        </label>
                    </label>
                    <div class="pagination" id="pagination"></div>
                </div>
            </div>

            <table id="txTable">
                <thead>
                    <tr>
                        <th onclick="sortTable(0)">Date</th>
                        <th onclick="sortTable(1)">Type</th>
                        <th onclick="sortTable(2)">Asset</th>
                        <th onclick="sortTable(3)">Montant</th>
                        <th onclick="sortTable(4)">Frais</th>
                        <th onclick="sortTable(5)">Balance</th>
                        <th>TxID</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>

            <div class="table-header">
                <div class="left-controls">
                    <div class="page-info" id="pageInfoBottom" style="font-weight:500;"></div>
                </div>
                <div class="right-controls">
                    <div class="pagination" id="paginationBottom"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allTransactions = [], filteredTransactions = [], selectedTypeFilters = [], selectedAssetFilters = [];
        let chart = null, currentSort = { col: 0, asc: false }, currentPage = 1, PAGE_SIZE = 10;
        let currentHoldings = {}, manualHoldings = {}, manualPrices = {};
        let crosshairX = null, crosshairY = null;
        let barZoomLevel = 1, curveZoomLevel = 1;
        // =====================================================================
        // IMAGE DE FOND DU GRAPHIQUE
        // Mettez le chemin de votre image ici (même dossier = juste le nom du fichier)
        // Exemple : 'monfond.png'  ou  'images/fond.jpg'
        const CHART_BG_PATH = '74d219a0976b0559d75a9480848314fb.PNG';   // <-- MODIFIEZ ICI
        const CHART_BG_OPACITY = 0.3; // opacité entre 0.0 et 1.0
        // =====================================================================
        let chartBgImage = null;
        let mouseClientX = 0, mouseClientY = 0;

        // Chargement automatique de l'image au démarrage
        if (CHART_BG_PATH) {
            const img = new Image();
            img.onload = () => { chartBgImage = img; if (chart) chart.draw(); };
            img.src = CHART_BG_PATH;
        }

        // Plugin image de fond — s'applique uniquement au chart à barres (balanceChart)
        const bgImagePlugin = {
            id: 'bgImage',
            beforeDraw(c) {
                if (!chartBgImage) return;
                if (c.canvas.id !== 'balanceChart') return; // uniquement le chart à barres
                const { ctx, chartArea: { left, top, width, height } } = c;
                const iw = chartBgImage.naturalWidth, ih = chartBgImage.naturalHeight;
                const scale = Math.min(width / iw, height / ih);
                const sw = iw * scale, sh = ih * scale;
                const sx = left + (width - sw) / 2;
                const sy = top + (height - sh) / 2;
                ctx.save();
                ctx.globalAlpha = CHART_BG_OPACITY;
                ctx.drawImage(chartBgImage, sx, sy, sw, sh);
                ctx.restore();
            }
        };
        Chart.register(bgImagePlugin);

        const crosshairPlugin = {
            id: 'crosshair',
            afterDraw(chart) {
                if (crosshairX === null) return;
                const ctx = chart.ctx;
                const chartArea = chart.chartArea;
                ctx.save();
                ctx.setLineDash([5, 5]);
                ctx.strokeStyle = 'rgba(148, 163, 184, 0.6)';
                ctx.lineWidth = 1;
                // Ligne verticale
                ctx.beginPath();
                ctx.moveTo(crosshairX, chartArea.top);
                ctx.lineTo(crosshairX, chartArea.bottom);
                ctx.stroke();
                // Ligne horizontale
                ctx.beginPath();
                ctx.moveTo(chartArea.left, crosshairY);
                ctx.lineTo(chartArea.right, crosshairY);
                ctx.stroke();
                ctx.restore();
            }
        };
        Chart.register(crosshairPlugin);
        let discreetMode = true;
        document.body.classList.add('discreet');

        function toggleDiscreetMode() {
            discreetMode = !discreetMode;
            document.body.classList.toggle('discreet', discreetMode);
            const btn = document.getElementById('discreetBtn');
            btn.textContent = discreetMode ? '👁‍🗨 Mode normal' : '👁 Mode discret';
            btn.style.background = discreetMode ? '#60a5fa' : '#334155';

        // Storage avec fallback mémoire (pour mobile file://)
        const memStorage = {};
        function storageGet(key) {
            try { return localStorage.getItem(key); }
            catch { return memStorage[key] || null; }
        }
        function storageSet(key, val) {
            try { localStorage.setItem(key, val); }
            catch { memStorage[key] = val; }
        }

        function loadSavedData() {
            const h = storageGet('krakenManualHoldings'); if (h) manualHoldings = JSON.parse(h);
            const p = storageGet('krakenManualPrices'); if (p) manualPrices = JSON.parse(p);
        }

        function saveManualPrices() { storageSet('krakenManualPrices', JSON.stringify(manualPrices)); }

        async function loadData() {
            try {
                const response = await fetch('kraken.csv');
                if (!response.ok) throw new Error('Fichier non trouvé');
                const csvText = await response.text();
                parseAndInit(csvText);
            } catch (e) {
                // Sur mobile ou si le fetch échoue, afficher juste le bouton file
                document.getElementById('loading').innerHTML = `
                    <div style="color:#94a3b8; margin-bottom:16px;">Aucun fichier.csv</div>
                    <label style="display:inline-block; background:#60a5fa; border-radius:12px; padding:14px 24px; cursor:pointer; color:white; font-size:1rem; font-weight:600;">
                        📂 Charger mon fichier.CSV
                        <input type="file" id="csvFileInput" accept=".csv" style="display:none;" onchange="loadFromFile(event)">
                    </label>`;
            }
        }

        function loadFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => parseAndInit(e.target.result);
            reader.readAsText(file);
        }

        function parseAndInit(csvText) {
            Papa.parse(csvText, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    allTransactions = results.data.map(row => ({
                        txid: row.txid || '', time: row.time || '', type: row.type || '', subtype: row.subtype || '',
                        asset: row.asset || '', amount: parseFloat(row.amount) || 0, fee: parseFloat(row.fee) || 0,
                        balance: parseFloat(row.balance) || 0, dateObj: row.time ? new Date(row.time) : null
                    })).filter(t => t.dateObj && !isNaN(t.dateObj.getTime()));

                    computeCurrentHoldings();
                    loadSavedData();

                    createSummary();
                    filteredTransactions = [...allTransactions];
                    renderTable();
                    createOrUpdateChart();
                    updateTypeTags();
                    renderManualTable();
                    refreshPortfolio();

                    setTimeout(() => { buildCurveChart(); }, 500);
                }
            });
        }

        let modalChartInstance = null;

        function openChartModal(type) {
            const modal = document.getElementById('chartModal');
            const title = document.getElementById('chartModalTitle');
            const canvas = document.getElementById('modalCanvas');

            if (modalChartInstance) { modalChartInstance.destroy(); modalChartInstance = null; }

            modal.classList.add('open');
            document.body.style.overflow = 'hidden';

            // Variables crosshair locales à la modale
            let mCrosshairX = null, mCrosshairY = null;

            const modalCrosshairPlugin = {
                id: 'modalCrosshair',
                afterDraw(c) {
                    if (mCrosshairX === null) return;
                    const { ctx, chartArea } = c;
                    ctx.save();
                    ctx.setLineDash([5, 5]);
                    ctx.strokeStyle = 'rgba(148,163,184,0.6)';
                    ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(mCrosshairX, chartArea.top); ctx.lineTo(mCrosshairX, chartArea.bottom); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(chartArea.left, mCrosshairY); ctx.lineTo(chartArea.right, mCrosshairY); ctx.stroke();
                    ctx.restore();
                }
            };

            // Helpers touch/mouse pour crosshair et tooltip
            function updateModalPointer(clientX, clientY) {
                const rect = canvas.getBoundingClientRect();
                mCrosshairX = clientX - rect.left;
                mCrosshairY = clientY - rect.top;
                mouseClientX = clientX;
                mouseClientY = clientY;
                if (modalChartInstance) modalChartInstance.draw();
            }

            function addModalEvents() {
                canvas.addEventListener('mousemove', e => updateModalPointer(e.clientX, e.clientY));
                canvas.addEventListener('mouseleave', () => {
                    mCrosshairX = null; mCrosshairY = null;
                    if (modalChartInstance) modalChartInstance.draw();
                    const t = document.getElementById('chartjs-custom-tooltip');
                    const t2 = document.getElementById('curve-tooltip');
                    if (t) t.style.opacity = '0';
                    if (t2) t2.style.opacity = '0';
                });
                canvas.addEventListener('touchmove', e => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    mCrosshairX = touch.clientX - canvas.getBoundingClientRect().left;
                    mCrosshairY = touch.clientY - canvas.getBoundingClientRect().top;
                    mouseClientX = touch.clientX;
                    mouseClientY = touch.clientY;
                    // Simuler mousemove pour que Chart.js calcule le bon tooltip
                    canvas.dispatchEvent(new MouseEvent('mousemove', {
                        clientX: touch.clientX, clientY: touch.clientY, bubbles: true
                    }));
                }, { passive: false });
                canvas.addEventListener('touchend', () => {
                    setTimeout(() => {
                        mCrosshairX = null; mCrosshairY = null;
                        if (modalChartInstance) modalChartInstance.draw();
                        const t = document.getElementById('chartjs-custom-tooltip');
                        const t2 = document.getElementById('curve-tooltip');
                        if (t) t.style.opacity = '0';
                        if (t2) t2.style.opacity = '0';
                    }, 2000);
                });
            }

            if (type === 'bar') {
                title.textContent = 'Retraits / Envois par Crypto par Mois';
                setTimeout(() => {
                    modalChartInstance = new Chart(canvas, {
                        type: chart.config.type,
                        data: JSON.parse(JSON.stringify(chart.config.data)),
                        options: { ...chart.config.options, maintainAspectRatio: false, responsive: true },
                        plugins: [modalCrosshairPlugin]
                    });
                    let mBarZoom = 1;
                    canvas.addEventListener('wheel', (e) => {
                        if (e.deltaY > 0 && mBarZoom <= 1) return;
                        if (e.deltaY < 0 && mBarZoom >= 50) return;
                        e.preventDefault();
                        if (e.deltaY < 0) { modalChartInstance.zoom(1.1); mBarZoom *= 1.1; }
                        else { modalChartInstance.zoom(0.9); mBarZoom = Math.max(1, mBarZoom * 0.9); }
                    }, { passive: false });
                    addModalEvents();
                }, 50);
            } else {
                title.textContent = 'Évolution Portfolio';
                setTimeout(() => {
                    modalChartInstance = new Chart(canvas, {
                        type: curveChartInstance.config.type,
                        data: JSON.parse(JSON.stringify(curveChartInstance.config.data)),
                        options: { ...curveChartInstance.config.options, maintainAspectRatio: false, responsive: true },
                        plugins: [modalCrosshairPlugin]
                    });
                    let mCurveZoom = 1;
                    canvas.addEventListener('wheel', (e) => {
                        if (e.deltaY > 0 && mCurveZoom <= 1) return;
                        if (e.deltaY < 0 && mCurveZoom >= 50) return;
                        e.preventDefault();
                        if (e.deltaY < 0) { modalChartInstance.zoom(1.1); mCurveZoom *= 1.1; }
                        else { modalChartInstance.zoom(0.9); mCurveZoom = Math.max(1, mCurveZoom * 0.9); }
                    }, { passive: false });
                    addModalEvents();
                }, 50);
            }
        }

        function computeCurrentHoldings() {
            currentHoldings = {};
            const latest = {};
            allTransactions.forEach(tx => {
                if (!tx.asset || !tx.dateObj || tx.asset.endsWith('.HOLD')) return;
                if (!latest[tx.asset] || tx.dateObj > latest[tx.asset].date) {
                    latest[tx.asset] = { balance: tx.balance, date: tx.dateObj };
                }
            });
            const withdrawn = {};
            allTransactions.forEach(tx => {
                if (tx.type === 'withdrawal' && coldWalletAssets.includes(tx.asset)) {
                    withdrawn[tx.asset] = (withdrawn[tx.asset] || 0) + Math.abs(tx.amount);
                }
            });
            Object.keys(latest).forEach(a => {
                currentHoldings[a] = coldWalletAssets.includes(a) ? (withdrawn[a] || 0) : latest[a].balance;
            });
            Object.keys(withdrawn).forEach(a => { if (!currentHoldings[a]) currentHoldings[a] = withdrawn[a]; });
        }

        function addManualHolding() {
            const asset = document.getElementById('manualAssetInput').value.trim().toUpperCase();
            const qty = parseFloat(document.getElementById('manualQtyInput').value);
            if (!asset || isNaN(qty) || qty <= 0) return alert("Remplis asset et quantité valide");
            manualHoldings[asset] = (manualHoldings[asset] || 0) + qty;
            saveManualHoldings();
            renderManualTable();
            refreshPortfolio();
            document.getElementById('manualAssetInput').value = '';
            document.getElementById('manualQtyInput').value = '';
        }

        function removeManualHolding(asset) {

                saveManualHoldings();

        async function getCurrentPrices(assets) {
            const knownAssets = assets.filter(a => !a.includes('EUR') && !a.includes('USD') && coingeckoIdMap[a]);
            const ids = [...new Set(knownAssets.map(a => coingeckoIdMap[a]))];
            if (!ids.length) return {};
            const url = `https://api.coingecko.com/api/v3/simple/price?ids=${ids.join(',')}&vs_currencies=eur`;
            try {
                const r = await fetch(url);
                if (r.ok) return await r.json();
                // Fallback proxy CORS pour mobile
                const r2 = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
                return r2.ok ? await r2.json() : {};
            } catch {
                try {
                    const r2 = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
                    return r2.ok ? await r2.json() : {};
                } catch { return {}; }
            }
        }

        function editManualPrice(asset) {
            let p = manualPrices[asset] || '';
            let input = prompt(`Prix manuel pour ${asset} en € :`, p);
            if (input === null) return;
            let price = parseFloat(input);
            if (isNaN(price) || price <= 0) delete manualPrices[asset];
            else manualPrices[asset] = price;
            saveManualPrices();
            refreshPortfolio();
        }

        async function refreshPortfolio() {
            const content = document.getElementById('portfolioContent');
            content.innerHTML = `<div style="text-align:center;padding:80px;color:#60a5fa;">🔄 Chargement des prix...</div>`;

            const threshold = parseFloat(document.getElementById('hideSmallPortfolioThreshold').value) || 100;
            const hideEnabled = document.getElementById('hideSmallCheck').checked;

            const allHoldings = {...currentHoldings};
            Object.keys(manualHoldings).forEach(a => allHoldings[a] = (allHoldings[a]||0) + manualHoldings[a]);

            const assets = Object.keys(allHoldings).filter(a => Math.abs(allHoldings[a]) > 0.00001).sort();
            const apiPrices = await getCurrentPrices(assets);

            let totalValue = 0, rows = [];

            assets.forEach(asset => {
                let qty = allHoldings[asset];
                let priceEur = null;
                if (asset.includes('EUR') || asset.includes('USD')) priceEur = 1;
                else {
                    const id = coingeckoIdMap[asset] || asset.toLowerCase();
                    if (apiPrices[id] && apiPrices[id].eur) priceEur = apiPrices[id].eur;
                    else if (manualPrices[asset]) priceEur = manualPrices[asset];
                }
                let valueEur = priceEur !== null ? qty * priceEur : null;
                if (valueEur !== null) totalValue += valueEur;

                if (hideEnabled && Math.abs(qty) < threshold) return;

                let badge = '';
                if (manualHoldings[asset]) badge += ' <span style="color:#eab308">(Manuel)</span>';
                if (coldWalletAssets.includes(asset)) badge += ' <span style="color:#eab308">(Ledger)</span>';
                if (manualPrices[asset] && priceEur === manualPrices[asset]) badge += ' <span style="color:#f59e0b">(prix manuel)</span>';

                rows.push(`<tr>
                    <td><strong>${asset}</strong>${badge}</td>
                    <td style="text-align:right">${qty.toFixed(8)}</td>
                    <td style="text-align:right">${priceEur===null?'N/A':priceEur.toFixed(6)} <button onclick="editManualPrice('${asset}');event.stopImmediatePropagation()">✏️</button></td>
                    <td class="discreet-hide" style="text-align:right;font-weight:600;color:${valueEur===null?'#64748b':'#60a5fa'}">${valueEur===null?'N/A':valueEur.toFixed(2)} €</td>
                </tr>`);
            });

            const eurDeposits = allTransactions.filter(t => t.type==='deposit' && t.asset.includes('EUR') && t.amount>0).reduce((s,t)=>s+t.amount,0);
            const eurWithdrawals = allTransactions.filter(t => t.type==='withdrawal' && t.asset.includes('EUR') && t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);
            const netInvested = eurDeposits - eurWithdrawals;
            const pnl = totalValue - netInvested;
            const pnlPercent = netInvested > 0 ? (pnl / netInvested * 100) : 0;

            content.innerHTML = `
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:24px;">
                    <div style="background:#1a2338;padding:20px;border-radius:12px;text-align:center"><div style="color:#94a3b8">Valeur totale</div><div class="discreet-hide" style="font-size:2.1rem;font-weight:700;color:#60a5fa">${totalValue.toFixed(2)} €</div></div>
                    <div style="background:#1a2338;padding:20px;border-radius:12px;text-align:center"><div style="color:#94a3b8">Investi net</div><div class="discreet-hide" style="font-size:2.1rem;font-weight:700">${netInvested.toFixed(2)} €</div></div>
                    <div style="background:#1a2338;padding:20px;border-radius:12px;text-align:center"><div style="color:#94a3b8">PnL total</div><div class="discreet-hide" style="font-size:2.1rem;font-weight:700;color:${pnl>=0?'#4ade80':'#f87171'}">${pnl>=0?'+' : ''}${pnl.toFixed(2)} €<br><span style="font-size:1.1rem">${pnlPercent.toFixed(2)}%</span></div></div>
                </div>
                <table style="width:100%;border-collapse:collapse">
                    <thead><tr style="background:#1a2338"><th>Asset</th><th style="text-align:right">Quantité</th><th style="text-align:right">Prix EUR</th><th style="text-align:right">Valeur EUR</th></tr></thead>
                    <tbody>${rows.length ? rows.join('') : '<tr><td colspan="4" style="text-align:center;padding:40px;color:#64748b">Aucune position à afficher</td></tr>'}</tbody>
                </table>`;

            // Reconstruire la courbe si les holdings changent
            if (curveChartInstance) { curveChartInstance.destroy(); curveChartInstance = null; buildCurveChart(); }

            // Si le mode discret est désactivé, forcer filter:none sans transition sur les nouveaux éléments
            if (!discreetMode) {
                content.querySelectorAll('.discreet-hide').forEach(el => {
                    el.style.transition = 'none';
                    el.style.filter = 'none';
                });
            }
        }

        function createSummary() {
            const totalTx = allTransactions.length;
            const uniqueAssets = new Set(allTransactions.map(t => t.asset)).size;
            const eurDeposits = allTransactions.filter(t => t.type === 'deposit' && t.asset.includes('EUR') && t.amount > 0).reduce((sum, t) => sum + t.amount, 0);
            document.getElementById('summary').innerHTML = `

                <div><strong>Assets différents</strong><br>${uniqueAssets}</div>
                <div><strong>Période</strong><br>2021 - 2026</div>`;
        }

        function createOrUpdateChart(filteredData = null) {
            const ctx = document.getElementById('balanceChart');
            if (chart) chart.destroy();
            const dataToUse = filteredData || allTransactions;

            const monthlyOut = {};
            dataToUse.forEach(tx => {
                if (!tx.dateObj || !tx.asset || Math.abs(tx.amount) < 0.0001) return;
                const isOut = tx.type === 'withdrawal' || (tx.type === 'trade' && tx.amount < 0);
                if (!isOut) return;
                const month = tx.dateObj.toISOString().slice(0, 7);
                const asset = tx.asset.replace('.HOLD', '');
                if (!monthlyOut[asset]) monthlyOut[asset] = {};
                if (!monthlyOut[asset][month]) monthlyOut[asset][month] = 0;
                monthlyOut[asset][month] += Math.abs(tx.amount);
            });

            const monthTotal = {};
            Object.keys(monthlyOut).forEach(asset => {
                Object.keys(monthlyOut[asset]).forEach(month => {
                    if (!monthTotal[month]) monthTotal[month] = 0;
                    monthTotal[month] += monthlyOut[asset][month];
                });
            });

            let allMonths = [...new Set(dataToUse.map(tx => tx.dateObj.toISOString().slice(0, 7)))].sort();
            const activeMonths = allMonths.filter(month => monthTotal[month] && monthTotal[month] > 1000);
            const labels = activeMonths;

            const sortedAssets = Object.keys(monthlyOut)
                .sort((a, b) => {
                    const volA = Object.values(monthlyOut[a]).reduce((s, v) => s + v, 0);
                    const volB = Object.values(monthlyOut[b]).reduce((s, v) => s + v, 0);
                    return volB - volA;
                })
                .slice(0, 12);

            const colors = ['#60a5fa','#f472b6','#34d399','#fbbf24','#a78bfa','#f87171','#c084fc','#fb923c','#4ade80','#eab308','#67e8f9','#f472b6'];

            const datasets = sortedAssets.map((asset, i) => ({
                label: asset,
                data: labels.map(month => monthlyOut[asset][month] || 0),
                backgroundColor: colors[i % colors.length]
            }));

            chart = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        title: { display: true, text: 'Retraits / Envois par Crypto par Mois', color: '#e2e8f0', font: { size: 18 } },
                        legend: { position: 'top', labels: { color: '#e2e8f0', boxWidth: 12 } },
                        tooltip: {
                            enabled: false,
                            mode: 'index',
                            intersect: false,
                            external: function(context) {
                                let tooltipEl = document.getElementById('chartjs-custom-tooltip');
                                if (!tooltipEl) {
                                    tooltipEl = document.createElement('div');
                                    tooltipEl.id = 'chartjs-custom-tooltip';
                                    tooltipEl.style.cssText = `
                                        position: fixed;
                                        background: rgba(15, 23, 42, 0.95);
                                        border: 1px solid #1e2a47;
                                        border-radius: 12px;
                                        padding: 12px 16px;
                                        pointer-events: none;
                                        font-size: 0.88rem;
                                        color: #e2e8f0;
                                        box-shadow: 0 8px 24px rgba(0,0,0,0.5);
                                        backdrop-filter: blur(8px);
                                        z-index: 9999999;
                                        min-width: 180px;
                                        opacity: 0;
                                    `;
                                    document.body.appendChild(tooltipEl);
                                }

                                const tooltipModel = context.tooltip;
                                if (tooltipModel.opacity === 0) {
                                    tooltipEl.style.opacity = '0';
                                    return;
                                }

                                // Titre
                                let html = `<div style="font-weight:700; color:#93c5fd; margin-bottom:8px; border-bottom:1px solid #1e2a47; padding-bottom:6px;">
                                    📅 ${tooltipModel.title[0] || ''}
                                </div>`;

                const prev = document.createElement('button'); prev.textContent = '← Précédent'; prev.disabled = currentPage === 1;
                prev.onclick = () => { currentPage--; renderTable(); }; container.appendChild(prev);
                for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {

        function sortTable(colIndex) {
            if (currentSort.col === colIndex) currentSort.asc = !currentSort.asc;
            else { currentSort.col = colIndex; currentSort.asc = (colIndex === 0) ? false : true; }

            filteredTransactions.sort((a, b) => {
                if (colIndex === 0) return currentSort.asc ? a.dateObj - b.dateObj : b.dateObj - a.dateObj;
                if (colIndex === 3) return currentSort.asc ? a.amount - b.amount : b.amount - a.amount;
                if (colIndex === 4) return currentSort.asc ? a.fee - b.fee : b.fee - b.fee;
                if (colIndex === 5) return currentSort.asc ? a.balance - b.balance : b.balance - a.balance;
                const valA = String(colIndex === 1 ? a.type : a.asset || '');
                const valB = String(colIndex === 1 ? b.type : b.asset || '');
                return currentSort.asc ? valA.localeCompare(valB, 'fr') : valB.localeCompare(valA, 'fr');

        async function fetchHistoricalPrices(assetTicker, cgId) {
            const url = `https://api.coingecko.com/api/v3/coins/${cgId}/market_chart?vs_currency=eur&days=max&interval=daily`;
            const proxies = [
                url,
                `https://corsproxy.io/?${encodeURIComponent(url)}`,
                `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
            ];
            for (const proxyUrl of proxies) {
                try {
                    const r = await fetch(proxyUrl);
                    if (!r.ok) continue;
                    const data = await r.json();
                    if (!data.prices?.length) continue;
                    const priceMap = {};
                    data.prices.forEach(([ts, price]) => {
                        priceMap[new Date(ts).toISOString().slice(0, 10)] = price;
                    });
                    return priceMap;
                } catch {}
            }
            return null; // null = échec, on garde le prix actuel
        }

                if (e.deltaY < 0) { curveChartInstance.zoom(1.1); curveZoomLevel *= 1.1; }
                else { curveChartInstance.zoom(0.9); curveZoomLevel = Math.max(1, curveZoomLevel * 0.9); }
            }, { passive: false });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const s = document.createElement('script');
            s.src = 'https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js';
            s.onload = loadData;
            document.head.appendChild(s);
        });
    </script>
</body>
